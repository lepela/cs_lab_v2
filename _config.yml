title: "Copilot Studio 핸즈온 Lab"
description: >-
  Power Automate + Copilot Studio로 HR 채용 자동화를 직접 만들어보는
  시티즌 개발자 대상 핸즈온 과정 (5.5시간).
baseurl: "/cs_lab_v2"
url: "https://lepela.github.io"

theme: just-the-docs
plugins:
  - jekyll-feed

search_enabled: true
search:
  heading_level: 2
  previews: 3

mermaid:
  version: "10.9.1"

aux_links:
  "Microsoft Learn Copilot Studio":
    - "https://learn.microsoft.com/ko-kr/microsoft-copilot-studio/"

nav_sort: order
color_scheme: light

# ★ 필수 — 전 페이지 기본 레이아웃 (없으면 테마 미적용 = 맨 HTML 렌더링)
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Just the Docs callouts — 본문의 {: .note } / {: .warning } / {: .important } / {: .time } 렌더링 정의
callouts_level: quiet
callouts:
  note:
    title: 팁
    color: blue
  time:
    title: 시간
    color: green
  warning:
    title: 주의
    color: red
  important:
    title: 핵심
    color: yellow

# 빌드 제외
exclude:
  - _instructions/
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
